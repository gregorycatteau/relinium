services:
  postgres:
    image: postgres:16
    container_name: relinium-postgres
    environment:
      POSTGRES_DB: relinium_app
      POSTGRES_USER: relinium_app
      POSTGRES_PASSWORD: relinium_app_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - relinium_postgres_data:/var/lib/postgresql/data

volumes:
  relinium_postgres_data:
